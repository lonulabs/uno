<!DOCTYPE html>
<html lang="es" ng-app="myApp">

<head>
  <meta charset="UTF-8">
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.6.9/angular.min.js"></script>
  <style>
    body {
      margin: 0;
      background: #777777;
      display: flex;
      flex-direction: column;
      align-items: center
    }

    header {
      display: flex;
      gap: 10px;
      padding: 10px;
      width: 100%;
      align-items: center
    }

    input {
      border-radius: 5px;
      border: none;
      padding: 10px;
      flex: 1
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 5px;
      width: 95%;
      margin: 20px
    }

    .grid div {
      border-radius: 5px;
      background-color: #aaaaaa;
      padding: 5px;
      /* height: 610px; */
      overflow: hidden
    }

    nav {
      display: flex;
      gap: 20px;
      align-items: center
    }

    nav span {
      font-size: 2em;
      color: #0f0;
      cursor: pointer
    }

    nav strong {
      color: #fff
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 5px;
      font-size: 0.8em;
      color: #fff;
    }

    table caption {
      text-align: left;
      font-weight: bold;
      margin-bottom: 4px;
    }

    table td {
      border: 1px solid #ccc;
      padding: 4px;
    }

    /* Filas alternadas */
    table tr:nth-child(odd) {
      background-color: rgb(255, 255, 255);
      /* más claro */
    }

    table tr:nth-child(even) {
      background-color: rgba(0, 0, 0, 1);
      /* más oscuro */
    }

    /* Opcional: efecto hover */
    table tr:hover {
      background-color: rgb(17, 163, 17);
      color: #eeff00;
      /* resalta en verde translúcido */
    }
  </style>
</head>

<body ng-controller="MainCtrl">
  <header>
    <input ng-model="search" placeholder="Filtrar por nombre o categoría">
    <span style="color:#fff;font-weight:bold">
      Total: {{filtered().length}}
    </span>
  </header>
  <div class="grid">
    <div ng-repeat="item in filtered().slice(page*10,(page+1)*10)">
      <img ng-src="{{item.img}}" style="width:auto;height:40%"><br>
      <span style="color:rgb(255, 255, 255)">{{item.categoria}}</span><br>
      <strong>{{item.nombre}}</strong><br>
      <small>{{item.info}}</small><br>
      <small>{{item.dosis}}</small><br>
      <table style="width:100%;color:#fff;font-size:0.8em;margin-top:5px;border-collapse:collapse">
        <caption style="text-align:left;font-weight:bold;color:#0f0">Formula {{item.formula.header}}</caption>
        <tr ng-repeat="row in item.formula.rows">
          <td style="border:1px solid #ccc;padding:2px">{{row[0]}}</td>
          <td style="border:1px solid #ccc;padding:2px">{{row[1]}}</td>
        </tr>
      </table>
    </div>
  </div>
  <nav>
    <button ng-click="prev()" ng-if="page>0" aria-label="Página anterior">&larr;</button>
    <strong>Página {{page+1}} / {{totalPages()}}</strong>
    <button ng-click="next()" ng-if="page<totalPages()-1" aria-label="Página siguiente">&rarr;</button>
  </nav>

  <script>
    angular.module('myApp', [])
      .controller('MainCtrl', function ($scope, $http) {
        $scope.page = 0;
        $scope.$watch('search', () => $scope.page = 0);
        $http.get('items.json').then(res => {
          $scope.items = [];
          angular.forEach(res.data, (arr, cat) => {
            arr.forEach(obj => obj.categoria = cat);
            $scope.items = $scope.items.concat(arr);
          });
        });
        $scope.filtered = function () {
          if (!$scope.search) return $scope.items;
          let s = $scope.search.toLowerCase();
          return $scope.items.filter(x =>
            x.nombre.toLowerCase().includes(s)
          );
        };
        $scope.totalPages = function () {
          return Math.max(1, Math.ceil($scope.filtered().length / 10));
        };
        $scope.next = () => $scope.page++;
        $scope.prev = () => $scope.page--;
      });
  </script>
</body>

</html>
